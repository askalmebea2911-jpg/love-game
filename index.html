<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>💝 የፍቅር ጨዋታ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #a18cd1 50%, #fbc2eb 75%, #ffecd2 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 15px; overflow-x: hidden; position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 50%; }
        }
        .floating-heart, .sparkle-star, .flying-butterfly, .falling-petal, .floating-bubble {
            position: fixed; pointer-events: none; z-index: 1;
        }
        .floating-heart { animation: floatUp 4s ease-in infinite; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.3); opacity: 0; }
            10% { opacity: 0.8; }
            50% { opacity: 1; transform: translateY(-40vh) rotate(180deg) scale(1.1); }
            100% { transform: translateY(-100vh) rotate(360deg) scale(1.4); opacity: 0; }
        }
        .sparkle-star { animation: twinkle 2s ease-in-out infinite; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.4) rotate(180deg); }
        }
        .flying-butterfly { animation: flyAcross 8s linear infinite; }
        @keyframes flyAcross {
            0% { transform: translateX(-100px) translateY(0) rotate(0deg) scaleX(1); }
            50% { transform: translateX(50vw) translateY(-40px) rotate(20deg) scaleX(-1); }
            100% { transform: translateX(110vw) translateY(0) rotate(0deg) scaleX(1); }
        }
        .falling-petal { animation: fallDown 5s linear infinite; }
        @keyframes fallDown {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.9; }
            50% { transform: translateY(50vh) rotate(180deg) translateX(-30px); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(-40px); opacity: 0; }
        }
        .floating-bubble {
            border-radius: 50%;
            animation: bubbleRise 6s ease-in infinite;
            box-shadow: 0 0 20px rgba(255,107,157,0.3);
        }
        @keyframes bubbleRise {
            0% { transform: translateY(0) scale(0.3); opacity: 0; }
            20% { opacity: 0.7; }
            50% { transform: translateY(-40vh) translateX(20px) scale(1); }
            100% { transform: translateY(-110vh) translateX(-20px) scale(1.5); opacity: 0; }
        }
        .game-container {
            width: 100%; max-width: 430px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center; padding: 25px 20px 30px;
            position: relative; z-index: 10;
            backdrop-filter: blur(20px);
        }
        .heart-icon { font-size: 60px; animation: beat 1s infinite; }
        @keyframes beat { 
            0%, 100% { transform: scale(1); } 
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        h1 { 
            color: #e91e63; margin: 10px 0; font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #e91e63, #c44dff);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; transition: all 0.3s ease; }
        .dot.completed { background: #4caf50; transform: scale(1.1); }
        .dot.current { background: #ff9800; animation: dotPulse 0.8s infinite; }
        @keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.6); } }
        .question-card-wrapper { margin: 20px 0; }
        .question-card {
            background: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            border-radius: 25px; padding: 30px 20px; min-height: 100px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 25px 50px rgba(233, 30, 99, 0.25);
            animation: cardFloat 3s ease-in-out infinite; position: relative; overflow: hidden;
        }
        @keyframes cardFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .question-text { font-size: 18px; color: #5c1a3d; font-weight: 700; position: relative; z-index: 3; line-height: 1.6; }
        .reward-area { margin: 15px 0; }
        .reward-area img, .reward-area video { 
            max-width: 100%; max-height: 300px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: block; margin: 0 auto; 
        }
        .options { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 14px 20px; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .btn:active { transform: scale(0.95); }
        .btn-answer { background: linear-gradient(135deg, #e91e63, #c2185b); color: white; flex: 1; max-width: 150px; }
        .btn-box { background: linear-gradient(135deg, #ff6b6b, #e91e63); color: white; flex: 1; max-width: 100px; font-size: 45px; height: 100px; border-radius: 25px; animation: boxBounce 2s infinite; }
        @keyframes boxBounce { 0%, 100% { transform: translateY(0); } 30% { transform: translateY(-15px); } 50% { transform: translateY(0); } 70% { transform: translateY(-7px); } }
        .btn-box:nth-child(2) { animation-delay: 0.3s; }
        .btn-box:nth-child(3) { animation-delay: 0.6s; }
        .btn-box.win { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .btn-box.lose { background: #999; animation: none; }
        .btn-next { background: #4caf50; color: white; width: 100%; display: none; margin-top: 10px; }
        .btn-restart { background: #ff9800; color: white; width: 100%; display: none; margin-top: 10px; }
        .message { font-size: 16px; color: #4a154b; margin: 10px 0; font-weight: 700; min-height: 40px; background: rgba(255,255,255,0.7); border-radius: 15px; padding: 12px; }
        .love-quote { color: #e91e63; font-style: italic; font-size: 15px; }
        .confetti { position: fixed; z-index: 999; pointer-events: none; animation: confettiFall 3s ease-out forwards; }
        @keyframes confettiFall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        @media (max-width: 380px) {
            .game-container { padding: 15px 12px 25px; border-radius: 20px; }
            .btn-answer { font-size: 14px; padding: 12px 15px; }
            h1 { font-size: 18px; }
            .question-text { font-size: 15px; }
            .btn-box { font-size: 38px; height: 80px; max-width: 80px; }
        }
    </style>
</head>
<body>

    <div id="animatedBg"></div>
    <div id="winConfetti"></div>

    <div class="game-container" id="gameContainer">
        <div class="heart-icon">💖</div>
        <h1>ፍቅረኛዬ ለአንደኛ አመታችን</h1>
        <div class="progress" id="progressDots"></div>
        <div class="question-card-wrapper">
            <div class="question-card" id="questionCard">
                <p class="question-text" id="questionText"></p>
            </div>
        </div>
        <div class="reward-area" id="rewardArea"></div>
        <div class="message" id="messageBox"></div>
        <div class="options" id="optionsContainer"></div>
        <button class="btn btn-next" id="nextBtn">ቀጣይ ጥያቄ ➡️</button>
        <button class="btn btn-restart" id="restartBtn">እንደገና ጀምር 🔄</button>
    </div>

    <script>
    var Q = [
        { q:"እኛ የተገናኘነው በየትኛው ወር እና ቀን ነው?", o:["ሚያዝያ 24","ሚያዝያ 25","ግንቦት 1","ሚያዝያ 30"], a:1, r:"q1" },
        { q:"5 + 5 × 2 ስንት ነው?", o:["15","20","10","25"], a:0, r:"q2" },
        { q:"የመጀመሪያ ቀን የሄድንበት ቦታ የት ነበር?", o:["ሲኒማ ቤት","ሬስቶራንት","ፓርክ","ካፌ"], a:3, r:"q3" },
        { q:"የ100 ግማሽ ግማሽ ስንት ነው?", o:["50","25","75","10"], a:1, r:"q4" },
        { q:"ለመጀመሪያ ጊዜ እጅ ለእጅ የያዝንበት ቀን?", o:["ሚያዝያ 24","ሚያዝያ 26","ሚያዝያ 25","ግንቦት 1"], a:2, r:"q5" },
        { q:"ጠዋት በአራት፣ ቀን በሁለት፣ ማታ በሶስት የሚራመደው ማነው?", o:["ድመት","ውሻ","ሰው","ወፍ"], a:2, r:"q6" },
        { q:"መጀመሪያ የሰጠሁሽ ስጦታ ምን ነበር?", o:["ፓስት ካርድ","አበባ","አንገት ሀብል","መጽሐፍ"], a:1, r:"q7" },
        { q:"ሁሌም ወደ ፊት የሚሄድ ግን ወደ ኋላ የማይመለስ ምንድነው?", o:["ውሀ","ንፋስ","ጊዜ","ፀሀይ"], a:2, r:"q8" },
        { q:"እኔ በጣም የምወደው ምግብ ምንድነው?", o:["ፒዛ","በርገር","ሽሮ ወጥ","የፍስክ ምግብ"], a:3, r:"q9" },
        { q:"ሁለት እናት፣ ሁለት ሴት ልጅ... ቤት ውስጥ ስንት ሰው አለ?", o:["3","4","5","6"], a:0, r:"q10" },
        { q:"እኔ ከሁሉም በላይ የምወደው መጠጥ?", o:["ቡና","ሻይ","ማኪያቶ","ውሃ"], a:0, r:"q11" },
        { q:"የሚያዩት ነገር ግን ሊነኩት የማይችሉት?", o:["ህልም","ሰማይ","ነጸብራቅ","ሁሉም"], a:3, r:"q12" },
        { q:"እኔ ሁሌም የምወደው ዘፈን የማን ነው?", o:["ቴዎድሮስ ካሳሁን","ጃኖ","ቴዲ ታደሰ","ሙላቱ አስታጥቄ"], a:2, r:"q13" },
        { q:"በእንግሊዝኛ 26 ፊደላት። በአማርኛ ስንት ቤተሰብ?", o:["26","33","7","34"], a:3, r:"q14" },
        { q:"አብረን ፊልም ስንመለከት ሁሌም የምታደርጊው?", o:["እነጫነጫለሁ","አወራለሁ","እተኛለሁ","እዘጋዋለሁ"], a:3, r:"q15" },
        { q:"ሁለት አባቶችና ሁለት ልጆች ዓሣ ማጥመድ... ሶስት ዓሣ ብቻ። እንዴት?", o:["አንዱ አልያዘም","ሶስት ሰዎች ብቻ ናቸው","ዓሣው ጠፋ","አንዱ ሁለት ያዘ"], a:1, r:"q16" },
        { q:"ሁሌም ስትናደጂ የምትይው ቃል?", o:["ምንም አይደለም","ሂድ ተወኝ","አታናግረኝ","የራስህ ጉዳይ"], a:3, r:"q17" },
        { q:"ሀኪም ሶስት ክኒን ሰጠና በየግማሽ ሰዓቱ አንድ። ለስንት ሰዓት?", o:["1 ሰዓት","1.5 ሰዓት","30 ደቂቃ","2 ሰዓት"], a:0, r:"q18" },
        { q:"አብረን የምንሄደው ቀጣዩ ጉዞ የት ነው?", o:["ሀዋሳ","ባህር ዳር","ገዳም","ድሬዳዋ"], a:2, r:"q19" },
        { q:"በረሃ ውስጥ ሁለት በሮች... አንድ ጥያቄ ብቻ በመጠየቅ ደህንነቱን እንዴት ታገኛለህ?", o:["ሁለታችሁም ውሸታሞች?","ደህንነቱ የትኛው?","ሌላው ጠባቂ ምን ይላል?","አንተ እውነተኛ ነህ?"], a:2, r:"q20" },
        { q:"ምንም ሳትነኪው መስበር የምትችይው?", o:["ብርጭቆ","በረዶ","ቃል","ሀ እና ለ"], a:2, r:"q21" },
        { q:"ያለ ማስጠንቀቂያ የሚመጣ፣ ሁሉንም የሚለውጠው?", o:["ሞት","እንቅልፍ","ሀሳብ","ሁሉም"], a:3, r:"q22" },
        { q:"እስከ እርጅና ስንደርስ ምን ማድረግ ትፈልጊያለሽ?", o:["መንገድ መሄድ","ቤት መቀመጥ","አብሮ መመንኮስ","ልጆችን ማሳደግ"], a:2, r:"q23" },
        { q:"ባዶ ክፍል ውስጥ ሰው ተቀምጧል... ሲወጣ እንባ አለ። ለምን?", o:["ፊልም እያየ ነበር","ሽንኩርት እየቆረጠ ነበር","ሀዘን አለው","አላውቅም"], a:1, r:"q24" },
        { q:"🎉 የመጨረሻው ልዩ ጥያቄ፦ ከዚህ ሁሉ በኋላ ምን ይሰማሻል?", o:["ደክሞኛል","ደስተኛ ነኝ","ፍቅረኛዬን አፈቅረዋለሁ!","ሁሉንም እዚህ ጻፊ"], a:3, r:"q25", s:true }
    ];

    var VID = ['q7','q9','q10','q12','q14','q16','q17','q18','q21','q24','q25'];
    var QUOTES = ["ፍቅር ማለት አንድ ላይ ማደግ ነው።","ዓይኖችሽ የኔ መኖሪያ ናቸው።","አንቺን ማፍቀሬ የልቤ ምርጫ ነው።","አንቺ የኔ ህልም ነሽ።","ፍቅራችን እንደ ከዋክብት ያበራል።","ልቤ ለአንቺ ብቻ ይመታል።","አንቺ የኔ ቆንጆ እውነት ነሽ።","ከአንቺ ጋር መሆን እድል ነው።"];

    var idx = 0, done = false;
    var els = {
        dots: document.getElementById('progressDots'),
        qt: document.getElementById('questionText'),
        rw: document.getElementById('rewardArea'),
        msg: document.getElementById('messageBox'),
        opts: document.getElementById('optionsContainer'),
        next: document.getElementById('nextBtn'),
        restart: document.getElementById('restartBtn'),
        card: document.getElementById('questionCard')
    };

    (function(){
        var bg = document.getElementById('animatedBg');
        var H = ['❤️','💕','💗','💖','💘','💝'];
        for(var i=0;i<12;i++){
            var h=document.createElement('div');h.className='floating-heart';
            h.textContent=H[i%6];h.style.left=Math.random()*100+'%';h.style.bottom='-50px';
            h.style.fontSize=(18+Math.random()*30)+'px';h.style.animationDelay=Math.random()*5+'s';
            h.style.animationDuration=(3+Math.random()*4)+'s';bg.appendChild(h);
        }
        for(var i=0;i<15;i++){
            var s=document.createElement('div');s.className='sparkle-star';
            s.textContent=['✨','⭐','🌟','💫'][i%4];s.style.left=Math.random()*100+'%';
            s.style.top=Math.random()*100+'%';s.style.fontSize=(12+Math.random()*20)+'px';
            s.style.animationDelay=Math.random()*3+'s';bg.appendChild(s);
        }
        for(var i=0;i<4;i++){
            var b=document.createElement('div');b.className='flying-butterfly';b.textContent='🦋';
            b.style.top=(5+Math.random()*80)+'%';b.style.fontSize=(20+Math.random()*20)+'px';
            b.style.animationDelay=Math.random()*8+'s';b.style.animationDuration=(7+Math.random()*6)+'s';bg.appendChild(b);
        }
        for(var i=0;i<12;i++){
            var p=document.createElement('div');p.className='falling-petal';
            p.textContent=['🌸','💮','🌺','🌷','🌹'][i%5];p.style.left=Math.random()*100+'%';
            p.style.top='-50px';p.style.fontSize=(16+Math.random()*18)+'px';
            p.style.animationDelay=Math.random()*6+'s';p.style.animationDuration=(3+Math.random()*4)+'s';bg.appendChild(p);
        }
        for(var i=0;i<6;i++){
            var bub=document.createElement('div');bub.className='floating-bubble';
            var sz=20+Math.random()*40;bub.style.width=sz+'px';bub.style.height=sz+'px';
            bub.style.left=Math.random()*100+'%';bub.style.bottom='-80px';
            bub.style.background='radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,182,193,0.4))';
            bub.style.animationDelay=Math.random()*6+'s';bub.style.animationDuration=(4+Math.random()*5)+'s';bg.appendChild(bub);
        }
    })();

    function confetti(){
        var c=document.getElementById('winConfetti');
        for(var i=0;i<40;i++){
            setTimeout(function(){
                var x=document.createElement('div');x.className='confetti';
                x.textContent=['🎉','🎊','💖','✨','🌟','💕','🎀','💝'][Math.floor(Math.random()*8)];
                x.style.left=Math.random()*100+'%';x.style.top='-50px';
                x.style.fontSize=(20+Math.random()*25)+'px';x.style.animationDuration=(2+Math.random()*3)+'s';
                c.appendChild(x);setTimeout(function(){x.remove();},3500);
            },i*25);
        }
    }

    function save(){try{localStorage.setItem('lg_idx',idx);localStorage.setItem('lg_done',done);}catch(e){}}
    function load(){try{var i=localStorage.getItem('lg_idx');if(i!==null){idx=parseInt(i);done=localStorage.getItem('lg_done')==='true';return true;}}catch(e){}return false;}

    function mkDots(){
        els.dots.innerHTML='';
        for(var i=0;i<Q.length;i++){
            var d=document.createElement('div');d.className='dot';
            if(i<idx)d.classList.add('completed');
            if(i===idx&&!done)d.classList.add('current');
            els.dots.appendChild(d);
        }
    }

    function showQ(){
        if(idx>=Q.length){finish();return;}
        els.rw.style.display='none';els.rw.innerHTML='';
        els.next.style.display='none';els.restart.style.display='none';
        els.opts.style.display='flex';els.card.style.display='flex';els.msg.innerHTML='';
        var q=Q[idx];
        els.qt.textContent='ጥያቄ '+(idx+1)+'፦ '+q.q;
        els.opts.innerHTML='';
        q.o.forEach(function(o,i){
            var b=document.createElement('button');b.className='btn btn-answer';b.textContent=o;
            b.onclick=function(){check(i);};els.opts.appendChild(b);
        });
        mkDots();save();
    }

    function check(sel){
        if(sel===Q[idx].a){
            els.msg.innerHTML='🎉 ትክክል! አሁን ሽልማትሽን ከሶስቱ ሳጥኖች ምረጪ!';
            els.opts.style.display='none';els.card.style.display='none';boxes();
        }else{
            els.msg.innerHTML='💔 አይ! እንደገና ሞክሪ። ትችያለሽ! 💪';
            els.msg.style.animation='none';els.msg.offsetHeight;els.msg.style.animation='shake 0.5s ease';
        }
    }

    function boxes(){
        els.opts.innerHTML='';els.opts.style.display='flex';
        els.msg.innerHTML='🎁 ከሶስቱ ሳጥኖች አንዱን ምረጪ! አንዱ ሽልማት ይዟል!';
        var win=Math.floor(Math.random()*3);
        for(var i=0;i<3;i++){
            var b=document.createElement('button');b.className='btn btn-box';b.textContent='🎁';
            (function(ix){b.onclick=function(){openBox(ix,win);};})(i);
            els.opts.appendChild(b);
        }
    }

    function openBox(sel,win){
        var btns=els.opts.querySelectorAll('.btn-box');
        btns.forEach(function(b){b.disabled=true;b.style.pointerEvents='none';});
        if(sel===win){
            btns[sel].textContent='💝';btns[sel].classList.add('win');
            els.msg.innerHTML='🎉 እድለኛ ነሽ! ዋናውን ስጦታ አገኘሽ!';
            showR(Q[idx].r,Q[idx].s);
            els.next.style.display='block';els.opts.style.display='none';
            confetti();idx++;save();
        }else{
            btns[sel].textContent='😢';btns[sel].classList.add('lose');
            els.msg.innerHTML='<div class="love-quote">"'+QUOTES[Math.floor(Math.random()*QUOTES.length)]+'"</div><div style="margin-top:10px;color:#e91e63;">ይሄ ዋናው ስጦታ አይደለም። ሌላ ሳጥን ሞክሪ!</div>';
            setTimeout(function(){
                btns.forEach(function(b,i){if(i!==sel){b.disabled=false;b.style.pointerEvents='auto';b.textContent='🎁';b.className='btn btn-box';}});
                btns[sel].textContent='❌';btns[sel].classList.add('lose');btns[sel].style.pointerEvents='none';
                els.msg.innerHTML='🎁 ሌላ ሳጥን ምረጪ!';
            },2000);
        }
    }

    function showR(rid,sp){
        els.rw.style.display='block';
        if(sp){
            els.rw.innerHTML='<div style="font-size:60px;">💌</div><p style="color:#d63384;font-size:20px;">ሁሌም አብረን እንሁን! ❤️</p>';
            if(VID.indexOf(rid)!==-1)setTimeout(function(){loadV(rid);},1500);
            return;
        }
        if(VID.indexOf(rid)!==-1)loadV(rid);else loadI(rid);
    }

    function loadI(rid){
        var img=new Image();
        img.onload=function(){
            els.rw.innerHTML='';
            img.style.cssText='max-width:100%;border-radius:15px;max-height:300px;display:block;margin:0 auto;box-shadow:0 5px 20px rgba(0,0,0,0.2);';
            els.rw.appendChild(img);
        };
        img.onerror=function(){els.rw.innerHTML='';};
        img.src=rid+'.jpg';
    }

    function loadV(rid){
        var v=document.createElement('video');
        v.controls=true;v.loop=true;v.muted=true;v.setAttribute('playsinline','');
        v.style.cssText='max-width:100%;border-radius:15px;max-height:300px;display:block;margin:0 auto;box-shadow:0 5px 20px rgba(0,0,0,0.2);background:#000;';
        v.onloadeddata=function(){els.rw.innerHTML='';els.rw.appendChild(v);v.play().catch(function(){});};
        v.onerror=function(){els.rw.innerHTML='';};
        v.src=rid+'.mp4';
    }

    function finish(){
        done=true;
        els.card.style.display='flex';els.qt.textContent='🌹 እንኳን ደስ አለሽ ፍቅረኛዬ! 🌹';
        els.msg.innerHTML='ሁሉንም አጠናቀቅሽ! ሚያዝያ 25 እኛ የተገናኘንበት ቀን ነው። ሁሌም አብረን እንሁን! ❤️';
        els.opts.style.display='none';els.next.style.display='none';els.restart.style.display='block';
        els.rw.style.display='block';els.rw.innerHTML='<div style="font-size:70px;animation:beat 1s infinite;">💖</div>';
        mkDots();save();confetti();setTimeout(confetti,1500);
    }

    els.restart.onclick=function(){idx=0;done=false;els.restart.style.display='none';showQ();save();};
    els.next.onclick=function(){showQ();};

    if(load()&&idx>0&&!done)showQ();
    else if(done)finish();
    else{mkDots();showQ();}
    </script>
</body>
</html>
