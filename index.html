    function speakAmharic(text, callback) {
        if (!soundEnabled) { if(callback) callback(); return; }
        stopCurrentAudio(); isSpeaking = true;
        var audio = document.createElement('audio'); audio.className = 'tts-audio'; audio.style.display = 'none';
        var url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=am&q=' + encodeURIComponent(text);
        audio.onerror = function() {
            var a2 = document.createElement('audio'); a2.className = 'tts-audio'; a2.style.display = 'none';
            a2.src = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            document.body.appendChild(a2); currentAudio = a2;
            a2.onended = function() { isSpeaking = false; if(callback) callback(); };
            a2.onerror = function() { isSpeaking = false; if(callback) callback(); };
            a2.play().catch(function(){ isSpeaking = false; if(callback) callback(); });
        };
        document.body.appendChild(audio); currentAudio = audio;
        audio.onended = function() { isSpeaking = false; if(callback) callback(); };
        audio.onerror = function() { isSpeaking = false; if(callback) callback(); };
        audio.src = url; audio.play().catch(function(){ isSpeaking = false; if(callback) callback(); });
    }

    function stopCurrentAudio() {
        if(currentAudio){currentAudio.pause();currentAudio.remove();currentAudio=null;}
        document.querySelectorAll('.tts-audio').forEach(function(a){a.pause();a.remove();});
        isSpeaking = false;
    }

    function speakSequence(msgs, cb) {
        if(msgs.length===0){if(cb)cb();return;}
        speakAmharic(msgs[0],function(){setTimeout(function(){speakSequence(msgs.slice(1),cb);},400);});
    }

    var AudioCtx=window.AudioContext||window.webkitAudioContext,audioCtx=null;

    function soundClick(){playBeep(440,0.08,'sine',0.2);}
    function soundFinish(){[523,587,659,698,784,880,988,1047].forEach(function(f,i){setTimeout(function(){playBeep(f,0.2,'sine',0.35);},i*120);});}
    function soundTimeout(){playBeep(300,0.2,'square',0.2);setTimeout(function(){playBeep(200,0.3,'square',0.15);},250);}

    document.getElementById('soundToggle').onclick=function(){soundEnabled=!soundEnabled;this.textContent=soundEnabled?'🔊':'🔇';if(!soundEnabled)stopCurrentAudio();};

    var Q=[
        {q:"እኛ የተገናኘነው በየትኛው ወር እና ቀን ነው?",o:["ሚያዝያ 24","ሚያዝያ 25","ግንቦት 1","ሚያዝያ 30"],a:1,r:"q1"},
        {q:"5 + 5 × 2 ስንት ነው?",o:["15","20","10","25"],a:0,r:"q2"},
        {q:"የመጀመሪያ ቀን የሄድንበት ቦታ?",o:["ሲኒማ ቤት","ሬስቶራንት","ፓርክ","ካፌ"],a:3,r:"q3"},
        {q:"የ100 ግማሽ ግማሽ ስንት ነው?",o:["50","25","75","10"],a:1,r:"q4"},
        {q:"ለመጀመሪያ ጊዜ እጅ ለእጅ የያዝንበት ቀን?",o:["ሚያዝያ 24","ሚያዝያ 26","ሚያዝያ 25","ግንቦት 1"],a:2,r:"q5"},
        {q:"ጠዋት በአራት፣ ቀን በሁለት፣ ማታ በሶስት?",o:["ድመት","ውሻ","ሰው","ወፍ"],a:2,r:"q6"},
        {q:"መጀመሪያ የሰጠሁሽ ስጦታ?",o:["ፓስት ካርድ","አበባ","አንገት ሀብል","መጽሐፍ"],a:1,r:"q7"},
        {q:"ወደ ፊት የሚሄድ ወደ ኋላ የማይመለስ?",o:["ውሀ","ንፋስ","ጊዜ","ፀሀይ"],a:2,r:"q8"},
        {q:"በጣም የምወደው ምግብ?",o:["ፒዛ","በርገር","ሽሮ ወጥ","የፍስክ ምግብ"],a:3,r:"q9"},
        {q:"2 እናት፣ 2 ሴት ልጅ... ስንት ሰው?",o:["3","4","5","6"],a:0,r:"q10"},
        {q:"ከሁሉም በላይ የምወደው መጠጥ?",o:["ቡና","ሻይ","ማኪያቶ","ውሃ"],a:0,r:"q11"},
        {q:"የሚያዩት ግን ሊነኩት የማይችሉት?",o:["ህልም","ሰማይ","ነጸብራቅ","ሁሉም"],a:3,r:"q12"},
        {q:"ሁሌም የምወደው ዘፈን?",o:["ቴዎድሮስ ካሳሁን","ጃኖ","ቴዲ ታደሰ","ሙላቱ አስታጥቄ"],a:2,r:"q13"},
        {q:"በአማርኛ ስንት ቤተሰብ ፊደላት?",o:["26","33","7","34"],a:3,r:"q14"},
        {q:"ፊልም ስንመለከት የምታደርጊው?",o:["እነጫነጫለሁ","አወራለሁ","እተኛለሁ","እዘጋዋለሁ"],a:3,r:"q15"},
        {q:"2 አባቶችና 2 ልጆች... 3 ዓሣ ብቻ። እንዴት?",o:["አንዱ አልያዘም","3 ሰዎች ብቻ","ዓሣው ጠፋ","አንዱ ሁለት ያዘ"],a:1,r:"q16"},
        {q:"ስትናደጂ የምትይው ቃል?",o:["ምንም አይደለም","ሂድ ተወኝ","አታናግረኝ","የራስህ ጉዳይ"],a:3,r:"q17"},
        {q:"3 ክኒን በየግማሽ ሰዓቱ። ለስንት ሰዓት?",o:["1 ሰዓት","1.5 ሰዓት","30 ደቂቃ","2 ሰዓት"],a:0,r:"q18"},
        {q:"ቀጣዩ ጉዞ የት ነው?",o:["ሀዋሳ","ባህር ዳር","ገዳም","ድሬዳዋ"],a:2,r:"q19"},
        {q:"በረሃ 2 በሮች... ደህንነት?",o:["ሁለታችሁም ውሸታሞች?","ደህንነቱ የትኛው?","ሌላው ምን ይላል?","አንተ እውነተኛ?"],a:2,r:"q20"},
        {q:"ሳትነኪው መስበር የምትችይው?",o:["ብርጭቆ","በረዶ","ቃል","ሀ እና ለ"],a:2,r:"q21"},
        {q:"ያለ ማስጠንቀቂያ የሚመጣው?",o:["ሞት","እንቅልፍ","ሀሳብ","ሁሉም"],a:3,r:"q22"},
        {q:"እስከ እርጅና ምን ትፈልጊያለሽ?",o:["መንገድ","ቤት","አብሮ መመንኮስ","ልጆች ማሳደግ"],a:2,r:"q23"},
        {q:"ባዶ ክፍል... እንባ?",o:["ፊልም","ሽንኩርት","ሀዘን","አላውቅም"],a:1,r:"q24"},
        {q:"🎉 የመጨረሻ፦ ምን ይሰማሻል?",o:["ደክሞኛል","ደስተኛ ነኝ","አፈቅረዋለሁ!","ሁሉንም ጻፊ"],a:3,r:"q25",s:true}
    ];
    var VID=['q7','q9','q10','q12','q14','q16','q17','q18','q21','q24','q25'];
    var QUOTES=["ፍቅር አንድ ላይ ማደግ ነው።","ዓይኖችሽ የኔ መኖሪያ ናቸው።","አንቺን ማፍቀሬ የልቤ ምርጫ ነው።","አንቺ የኔ ህልም ነሽ።","ፍቅራችን እንደ ከዋክብት ያበራል።","ልቤ ለአንቺ ብቻ ይመታል።"];

    var idx=0,done=false,lives=3,attempts=0,correctCount=0,timerInterval=null,timeLeft=15,timerActive=false;

    function confetti(){var c=document.getElementById('confettiLayer');var e=['🎉','🎊','💖','✨','🌟','💕','🎀','💝'];for(var i=0;i<50;i++){setTimeout(function(){var x=document.createElement('span');x.className='confetti-piece';x.textContent=e[Math.floor(Math.random()*e.length)];x.style.left=Math.random()*100+'%';x.style.top='-30px';x.style.fontSize=(16+Math.random()*30)+'px';x.style.animationDuration=(2.5+Math.random()*3.5)+'s';c.appendChild(x);setTimeout(function(){x.remove();},4000);},i*18);}}
    function save(){try{localStorage.setItem('lg_idx',idx);localStorage.setItem('lg_done',done);localStorage.setItem('lg_lives',lives);localStorage.setItem('lg_correct',correctCount);localStorage.setItem('lg_attempts',attempts);}catch(e){}}
    function mkDots(){var d=document.getElementById('progressDots');d.innerHTML='';for(var i=0;i<Q.length;i++){var x=document.createElement('div');x.className='dot';if(i<idx)x.classList.add('completed');if(i===idx&&!done)x.classList.add('current');d.appendChild(x);}}
    function updateHearts(){document.querySelectorAll('.heart-life').forEach(function(h,i){if(i>=lives)h.classList.add('lost');else h.classList.remove('lost');});}
    function updateAttempts(){document.getElementById('attemptsCount').textContent=attempts;}
    function updateTimerDisplay(){document.getElementById('timerCount').textContent=timeLeft;}

    function startTimer(){stopTimer();timeLeft=15;updateTimerDisplay();timerActive=true;timerInterval=setInterval(function(){timeLeft--;updateTimerDisplay();if(timeLeft<=5)document.getElementById('timerDisplay').classList.add('timer-danger');else if(timeLeft<=10)document.getElementById('timerDisplay').classList.add('timer-warning');if(timeLeft<=0){stopTimer();soundTimeout();speakAmharic(gm('timeout'));loseLife();}},1000);}
    function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;timerActive=false;document.getElementById('timerDisplay').classList.remove('timer-warning','timer-danger');}
    function loseLife(){lives--;updateHearts();if(lives<=0){gameOver();}else{document.getElementById('messageBox').innerHTML='💔 ጊዜ አልቋል!';document.getElementById('messageBox').className='message error';stopTimer();startTimer();}}
    function gameOver(){stopTimer();done=true;save();speakAmharic(gm('gameover'));var o=document.createElement('div');o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;justify-content:center;align-items:center;';o.innerHTML='<div style="background:white;border-radius:25px;padding:25px;text-align:center;max-width:320px;"><div style="font-size:50px;">💔</div><h2 style="color:#e91e63;">ልቦች አልቀዋል!</h2><p>'+correctCount+' ትክክለኛ | '+attempts+' ሙከራ</p><button class="btn btn-restart" style="display:block;width:100%;margin-top:15px;" onclick="location.reload()">🔄 እንደገና ሞክር</button></div>';document.body.appendChild(o);}
    function getStars(){if(correctCount>=20)return'⭐⭐⭐';else if(correctCount>=12)return'⭐⭐';else if(correctCount>=5)return'⭐';else return'💪';}

    function disableAnswers(dis){document.querySelectorAll('.btn-answer').forEach(function(b){b.disabled=dis;});}

    function showQ(){
        if(idx>=Q.length){finishGame();return;}
        if(lives<=0){gameOver();return;}
        stopTimer();
        document.getElementById('rewardArea').style.display='none';
        document.getElementById('nextBtn').style.display='none';
        document.getElementById('optionsContainer').style.display='flex';
        document.getElementById('questionCard').style.display='flex';
        document.getElementById('messageBox').innerHTML='';document.getElementById('messageBox').className='message';
        var q=Q[idx];
        document.getElementById('questionText').textContent='ጥያቄ '+(idx+1)+'፦ '+q.q;
        var opts=document.getElementById('optionsContainer');opts.innerHTML='';
        q.o.forEach(function(o,i){var b=document.createElement('button');b.className='btn btn-answer';b.textContent=o;b.onclick=function(){check(i);};opts.appendChild(b);});
        mkDots();updateHearts();updateAttempts();
        disableAnswers(true);
        document.getElementById('listeningIndicator').style.display='block';
        speakAmharic(q.q,function(){document.getElementById('listeningIndicator').style.display='none';disableAnswers(false);startTimer();});
        save();
    }

    function check(sel){
        if(!timerActive||isSpeaking)return;
        stopTimer();attempts++;updateAttempts();soundClick();
        var msg=document.getElementById('messageBox');
        if(sel===Q[idx].a){correctCount++;msg.innerHTML='🎉 ትክክል!';msg.className='message success';speakAmharic(gm('correct'),function(){document.getElementById('optionsContainer').style.display='none';document.getElementById('questionCard').style.display='none';boxes();});}
        else{msg.innerHTML='💔 አይ! እንደገና ሞክር!';msg.className='message error';speakAmharic(gm('wrong'),function(){msg.className='message';startTimer();});}
        save();
    }

    function boxes(){
        var opts=document.getElementById('optionsContainer');opts.innerHTML='';opts.style.display='flex';
        document.getElementById('messageBox').innerHTML='🎁 ሳጥን ምረጪ!';document.getElementById('messageBox').className='message';
        speakAmharic(gm('boxes'));
        var win=Math.floor(Math.random()*3);
        for(var i=0;i<3;i++){var b=document.createElement('button');b.className='btn btn-box';b.textContent='🎁';(function(ix){b.onclick=function(){openBox(ix,win);};})(i);opts.appendChild(b);}
    }

    function openBox(sel,win){
        var btns=document.querySelectorAll('.btn-box');btns.forEach(function(b){b.disabled=true;b.style.pointerEvents='none';});
        var msg=document.getElementById('messageBox');
        if(sel===win){soundWin();btns[sel].textContent='💝';btns[sel].classList.add('win');msg.innerHTML='🎉 '+gm('winTitle');msg.className='message success';speakAmharic(gm('win'),function(){showR(Q[idx].r,Q[idx].s);document.getElementById('nextBtn').style.display='block';document.getElementById('optionsContainer').style.display='none';confetti();idx++;save();});}
        else{soundLose();btns[sel].textContent='😢';btns[sel].classList.add('lose');for(var i=0;i<btns.length;i++){if(i!==sel)btns[i].textContent='📦';}var qt=QUOTES[Math.floor(Math.random()*QUOTES.length)];msg.innerHTML='<div style="color:#e91e63;font-style:italic;">"'+qt+'"</div><div style="margin-top:6px;">ባዶ ሳጥን!</div>';msg.className='message';speakSequence([gm('empty'),qt],function(){document.getElementById('nextBtn').style.display='block';document.getElementById('optionsContainer').style.display='none';idx++;save();setTimeout(function(){showQ();},500);});}
    }

    function showR(rid,sp){
        var rw=document.getElementById('rewardArea');rw.style.display='block';
        if(sp){rw.innerHTML='<div style="font-size:60px;">💌</div><p style="color:#d63384;">ሁሌም አብረን! ❤️</p>';if(VID.indexOf(rid)!==-1)setTimeout(function(){loadV(rid);},1500);return;}
        if(VID.indexOf(rid)!==-1)loadV(rid);else loadI(rid);
    }
    function loadI(rid){var rw=document.getElementById('rewardArea');var img=new Image();img.onload=function(){rw.innerHTML='';img.style.cssText='max-width:100%;border-radius:18px;max-height:220px;display:block;margin:0 auto;box-shadow:0 12px 35px rgba(0,0,0,0.2);border:3px solid rgba(255,215,0,0.4);';rw.appendChild(img);};img.onerror=function(){rw.innerHTML='';};img.src=getDriveUrl(DRIVE[rid]);}
    function loadV(rid){var rw=document.getElementById('rewardArea');var v=document.createElement('video');v.controls=true;v.loop=true;v.muted=true;v.setAttribute('playsinline','');v.style.cssText='max-width:100%;border-radius:18px;max-height:220px;display:block;margin:0 auto;background:#000;';v.onloadeddata=function(){rw.innerHTML='';rw.appendChild(v);v.play().catch(function(){});};v.onerror=function(){rw.innerHTML='';};v.src=getDriveUrl(DRIVE[rid]);}

    function finishGame(){
        stopTimer();done=true;soundFinish();
        document.getElementById('questionCard').style.display='flex';
        document.getElementById('questionText').textContent='🌹 እንኳን ደስ አለሽ! 🌹';
        document.getElementById('messageBox').innerHTML='<div style="font-size:25px;">'+getStars()+'</div>'+correctCount+' ትክክለኛ። ሁሌም አብረን! ❤️';
        document.getElementById('messageBox').className='message success';
        document.getElementById('optionsContainer').style.display='none';
        document.getElementById('nextBtn').style.display='none';
        document.getElementById('rewardArea').style.display='block';
        document.getElementById('rewardArea').innerHTML='<div style="font-size:80px;">💖</div>';
        mkDots();save();confetti();
        setTimeout(function(){showFinishCard();},1500);
    }

    function showWelcomeCard(){
        var o=document.createElement('div');o.className='message-card-overlay';o.id='welcomeCard';
        o.innerHTML='<div class="message-card"><div style="font-size:60px;">💖</div><h2>እንኳን አደረሰሽ! 🎉</h2><p>እንኳን ለአንደኛ አመት የክብረ በዓላችሁ በሰላም አደረሰሽ!</p><p style="font-size:13px;color:#999;">ይህንን ጨዋታ በመጫወት ከፍቅረኛሽ ጋር ያለሽን ቆይታ አስታውሽበት።</p><button class="card-btn" onclick="closeCardStartGame()">💝 ጨዋታ ጀምር</button></div>';
        document.body.appendChild(o);speakAmharic(gm('welcome'));
    }

    function closeCardStartGame(){var c=document.getElementById('welcomeCard');if(c)c.remove();document.getElementById('introScreen').style.display='none';document.getElementById('gameScreen').style.display='block';mkDots();updateHearts();updateAttempts();showQ();}

    function showFinishCard(){
        var o=document.createElement('div');o.className='message-card-overlay';o.id='finishCard';
        o.innerHTML='<div class="message-card"><div style="font-size:60px;">🌹</div><h2>እንኳን ደስ አለሽ! 🎊</h2><div style="font-size:40px;">'+getStars()+'</div><p>'+correctCount+' ትክክለኛ መልሶች</p><p style="color:#e91e63;font-weight:700;">የህይወቴን ሙሉ አንቺ ጋር መኖር እፈልጋለሁ።</p><p style="font-size:12px;color:#999;">ከፍቅረኛሽ ጋር ያለሽን ቆይታ ሁሌም አስታውሽበት 💕</p><button class="card-btn" onclick="document.getElementById(\'finishCard\').remove()">💝 አመሰግናለሁ</button></div>';
        document.body.appendChild(o);speakAmharic(gm('finish'));
    }

    document.getElementById('restartBtn').onclick=function(){stopTimer();stopCurrentAudio();idx=0;done=false;lives=3;attempts=0;correctCount=0;document.getElementById('nextBtn').style.display='none';updateHearts();updateAttempts();showQ();save();};
    document.getElementById('nextBtn').onclick=function(){stopTimer();showQ();};
    document.addEventListener('click',function(){getAudioCtx();},{once:true});
</script>
